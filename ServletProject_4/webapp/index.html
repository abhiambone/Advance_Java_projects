<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Premium Student Dashboard</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        background-attachment: fixed;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        position: relative;
    }

    /* Animated Background Particles */
    .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1;
    }

    .particle {
        position: absolute;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        animation: float 20s infinite linear;
    }

    .particle:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { width: 60px; height: 60px; left: 20%; animation-delay: 2s; }
    .particle:nth-child(3) { width: 100px; height: 100px; left: 80%; animation-delay: 4s; }
    .particle:nth-child(4) { width: 40px; height: 40px; left: 90%; animation-delay: 6s; }
    .particle:nth-child(5) { width: 70px; height: 70px; left: 60%; animation-delay: 8s; }

    @keyframes float {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Premium Glass Effect Container */
    .dashboard {
        position: relative;
        z-index: 10;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
        animation: slideDown 1s ease-out;
    }

    .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
        border-radius: 20px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    h1 {
        color: white;
        font-size: 42px;
        font-weight: 800;
        background: linear-gradient(135deg, #fff, #f0f0f0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1px;
        margin-bottom: 8px;
    }

    .subtitle {
        color: rgba(255,255,255,0.8);
        font-size: 18px;
        font-weight: 400;
    }

    /* Premium Stats Cards */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        max-width: 1200px;
        width: 100%;
        margin-bottom: 40px;
        animation: slideUp 1s ease-out 0.3s both;
    }

    .stat-card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 24px;
        padding: 32px;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: 0.6s;
    }

    .stat-card:hover::before {
        left: 100%;
    }

    .stat-card:hover {
        transform: translateY(-12px) scale(1.02);
        box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        border-color: rgba(255,255,255,0.4);
    }

    .stat-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .stat-card:nth-child(1) .stat-icon { background: linear-gradient(135deg, #ff6b6b, #ee5a52); }
    .stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
    .stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, #45b7d1, #3498db); }
    .stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, #f9ca24, #f0932b); }

    .stat-number {
        font-size: 36px;
        font-weight: 800;
        color: white;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #fff, #f0f0f0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .stat-label {
        color: rgba(255,255,255,0.9);
        font-size: 16px;
        font-weight: 500;
    }

    /* Action Buttons */
    .actions {
        display: flex;
        gap: 20px;
        animation: slideUp 1s ease-out 0.6s both;
        flex-wrap: wrap;
        justify-content: center;
    }

    .btn {
        padding: 16px 32px;
        border: none;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        color: white;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        min-width: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .btn-success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .btn-warning {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .btn-danger {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }

    .btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 32px rgba(0,0,0,0.3);
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: 0.5s;
    }

    .btn:hover::before {
        left: 100%;
    }

    /* Premium Badge */
    .premium-badge {
        position: absolute;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #ffd700, #ffed4e);
        color: #1a1a1a;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 12px rgba(255,215,0,0.4);
        animation: glow 2s ease-in-out infinite alternate;
        z-index: 100;
    }

    @keyframes glow {
        from { box-shadow: 0 4px 12px rgba(255,215,0,0.4); }
        to { box-shadow: 0 4px 20px rgba(255,215,0,0.6); }
    }

    /* Animations */
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .stats-grid {
            grid-template-columns: 1fr;
            gap: 16px;
        }
        
        h1 {
            font-size: 32px;
        }
        
        .actions {
            flex-direction: column;
            align-items: center;
        }
        
        .btn {
            width: 100%;
            max-width: 300px;
        }
    }
</style>

</head>

<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="premium-badge">⭐ PREMIUM</div>

    <div class="dashboard">
        <div class="header">
            <div class="logo">🎓</div>
            <h1>Student System</h1>
            <div class="subtitle">Premium Dashboard</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-number">11</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-number">11</div>
                <div class="stat-label">New Registrations</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔐</div>
                <div class="stat-number">10</div>
                <div class="stat-label">Active Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✏️</div>
                <div class="stat-number">1</div>
                <div class="stat-label">Updates Today</div>
            </div>
        </div>

        <div class="actions">
            <a href="register.html" class="btn btn-success">
                📝 Register New
            </a>
            <a href="login.html" class="btn btn-primary">
                🔐 Student Login
            </a>
            <a href="view" class="btn btn-warning">
                📋 View Students
            </a>
            <a href="update.html" class="btn btn-danger">
                ✏ Premium Update
            </a>
        </div>
    </div>
</body>
</html>
