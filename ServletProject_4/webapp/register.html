<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register Student</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: white;
        padding: 35px;
        border-radius: 15px;
        width: 380px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e3c72;
    }

    .input-group {
        margin-bottom: 15px;
    }

    .input-group label {
        display: block;
        font-size: 14px;
        margin-bottom: 5px;
        color: #333;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        transition: 0.3s;
    }

    .input-group input:focus {
        border-color: #2a5298;
        outline: none;
        box-shadow: 0 0 5px rgba(42,82,152,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        background: #2a5298;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #1e3c72;
        transform: scale(1.03);
    }

    .back {
        text-align: center;
        margin-top: 15px;
    }

    .back a {
        text-decoration: none;
        color: #2a5298;
        font-size: 14px;
    }

    .back a:hover {
        text-decoration: underline;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

</head>

<body>

<div class="container">

    <h2>📝 Register Student</h2>

    <form action="register" method="post">

        <div class="input-group">
            <label>Roll Number</label>
            <input type="number" name="roll" required>
        </div>

        <div class="input-group">
            <label>Student Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-group">
            <label>Percentage</label>
            <input type="text" name="per">
        </div>

        <div class="input-group">
            <label>Father Name</label>
            <input type="text" name="fname">
        </div>

        <div class="input-group">
            <label>Mother Name</label>
            <input type="text" name="mname">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="mail">
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input type="text" name="ph">
        </div>

        <button type="submit">Register</button>

    </form>

    <div class="back">
        <a href="index.html">⬅ Back to Home</a>
    </div>

</div>

</body>
</html>
