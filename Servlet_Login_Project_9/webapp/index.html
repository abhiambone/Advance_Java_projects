<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #667eea, #764ba2);
    }

    .login-box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
    }

    .login-box h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .input-box {
        margin-bottom: 15px;
        text-align: left;
    }

    .input-box label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .input-box input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
    }

    .input-box input:focus {
        border-color: #667eea;
    }

    .btn {
        width: 100%;
        padding: 10px;
        background: #667eea;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    .btn:hover {
        background: #5a67d8;
    }

    .footer {
        margin-top: 15px;
        font-size: 14px;
        color: #555;
    }
</style>

</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form action="Login" method="post">
        
        <div class="input-box">
            <label>Email</label>
            <input type="text" name="email" placeholder="Enter Email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <input type="submit" value="Login" class="btn">
    </form>

    <div class="footer">
        Welcome to your portal 🚀
    </div>
</div>

</body>
</html>
