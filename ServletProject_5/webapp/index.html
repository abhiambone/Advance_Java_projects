<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration Form</title>
<style>
/* Body with gradient background */
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    overflow: hidden;
    position: relative;
}

/* Animated Stars Background */
.stars {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite ease-in-out;
}

.star:nth-child(1) { width: 2px; height: 2px; top: 10%; left: 10%; animation-delay: 0s; }
.star:nth-child(2) { width: 3px; height: 3px; top: 20%; left: 20%; animation-delay: 0.2s; }
.star:nth-child(3) { width: 1px; height: 1px; top: 30%; left: 30%; animation-delay: 0.4s; }
.star:nth-child(4) { width: 2px; height: 2px; top: 40%; left: 40%; animation-delay: 0.6s; }
.star:nth-child(5) { width: 4px; height: 4px; top: 50%; left: 50%; animation-delay: 0.8s; }
.star:nth-child(6) { width: 1.5px; height: 1.5px; top: 60%; left: 60%; animation-delay: 1s; }
.star:nth-child(7) { width: 3px; height: 3px; top: 70%; left: 70%; animation-delay: 1.2s; }
.star:nth-child(8) { width: 2px; height: 2px; top: 80%; left: 80%; animation-delay: 1.4s; }
.star:nth-child(9) { width: 1px; height: 1px; top: 15%; left: 70%; animation-delay: 1.6s; }
.star:nth-child(10) { width: 2.5px; height: 2.5px; top: 25%; left: 85%; animation-delay: 1.8s; }
.star:nth-child(11) { width: 3px; height: 3px; top: 85%; left: 15%; animation-delay: 0.3s; }
.star:nth-child(12) { width: 1px; height: 1px; top: 90%; left: 90%; animation-delay: 0.7s; }
.star:nth-child(13) { width: 2px; height: 2px; top: 5%; left: 90%; animation-delay: 1.1s; }
.star:nth-child(14) { width: 4px; height: 4px; top: 75%; left: 25%; animation-delay: 1.5s; }
.star:nth-child(15) { width: 1.5px; height: 1.5px; top: 35%; left: 90%; animation-delay: 0.9s; }
.star:nth-child(16) { width: 3px; height: 3px; top: 65%; left: 10%; animation-delay: 0.5s; }
.star:nth-child(17) { width: 2px; height: 2px; top: 45%; left: 75%; animation-delay: 1.3s; }
.star:nth-child(18) { width: 1px; height: 1px; top: 95%; left: 45%; animation-delay: 0.1s; }
.star:nth-child(19) { width: 2.5px; height: 2.5px; top: 12%; left: 45%; animation-delay: 1.7s; }
.star:nth-child(20) { width: 3px; height: 3px; top: 82%; left: 65%; animation-delay: 0.4s; }

/* Twinkling animation */
@keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

/* Shooting stars */
.shooting-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 5px white;
    animation: shoot 3s linear infinite;
}

.shooting-star:nth-child(1) {
    top: 20%;
    left: -10%;
    animation-delay: 0s;
}

.shooting-star:nth-child(2) {
    top: 60%;
    left: -10%;
    animation-delay: 1.5s;
}

.shooting-star:nth-child(3) {
    top: 80%;
    left: -10%;
    animation-delay: 2.8s;
}

/* Shooting star animation */
@keyframes shoot {
    0% {
        transform: translateX(0) translateY(0) rotate(45deg);
        opacity: 1;
    }
    100% {
        transform: translateX(300vw) translateY(300vh) rotate(45deg);
        opacity: 0;
    }
}

/* Form styling */
form {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 30px 25px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    width: 400px;
    animation: formSlideIn 1s ease-out forwards;
    opacity: 0;
    transform: translateY(50px);
}

/* Form slide-in animation */
@keyframes formSlideIn {
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

/* Heading */
h2 {
    text-align: center;
    color: #1a237e;
    margin-bottom: 25px;
    font-size: 24px;
    animation: headingGlow 2s ease-in-out infinite alternate;
}

/* Heading glow animation */
@keyframes headingGlow {
    from { 
        text-shadow: 0 0 10px rgba(26, 35, 126, 0.5);
        transform: scale(1);
    }
    to { 
        text-shadow: 0 0 20px rgba(26, 35, 126, 0.8);
        transform: scale(1.02);
    }
}

/* Labels and inputs */
label {
    font-weight: 600;
    display: block;
    margin-top: 20px;
    color: #333;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 15px 12px; /* Fixed padding - equal left/right */
    margin-top: 8px;
    border-radius: 12px;
    border: 2px solid #e0e0e0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 16px;
    background: rgba(255, 255, 255, 0.8);
    box-sizing: border-box; /* Ensures padding is included in width */
    text-align: center; /* Centers placeholder text */
}

/* Center placeholder text specifically */
input::placeholder {
    text-align: center;
    font-style: italic;
    color: #999;
}

input:focus {
    border-color: #1a237e;
    box-shadow: 0 0 20px rgba(26, 35, 126, 0.3);
    outline: none;
    transform: translateY(-2px);
    background: white;
    text-align: left; /* Normal left alignment when focused/typing */
}

input:focus::placeholder {
    text-align: left; /* Placeholder moves left when focused */
}

/* Button */
button {
    width: 100%;
    padding: 15px;
    margin-top: 25px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #1a237e, #3f51b5);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}

button:hover::before {
    left: 100%;
}

button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 15px 30px rgba(26, 35, 126, 0.4);
    background: linear-gradient(45deg, #3f51b5, #1a237e);
}

/* Responsive design */
@media (max-width: 480px) {
    form {
        width: 90%;
        margin: 20px;
        padding: 25px 20px;
    }
    
    input {
        padding: 14px 10px; /* Slightly smaller padding on mobile */
    }
}
</style>
</head>
<body>
    <!-- Animated Stars Background -->
    <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        
        
        <!-- Shooting Stars -->
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
    </div>

    <form action="submitForm" method="post">
        <h2>✨ User Registration ✨</h2>

        <label for="name1">Name:</label>
        <input type="text" id="name1" name="name1" placeholder="Enter your name" required>

        <label for="email1">Email:</label>
        <input type="email" id="email1" name="email1" placeholder="Enter your email" required>

        <label for="paswd1">Password:</label>
        <input type="password" id="paswd1" name="paswd1" placeholder="Enter password" required>

        <label for="Loc1">Location:</label>
        <input type="text" id="Loc1" name="Loc1" placeholder="Enter your location" required>

        <button type="submit">🚀 Create Account</button>
    </form>
</body>
</html>
